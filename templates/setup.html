<!--
  首次安装引导页 — 自动检查环境、拉取基础镜像、预构建全部题库镜像。
  构建过程使用 SSE 实时显示 Docker 构建日志（类似终端 apt-get 输出）。
-->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>系统初始化 - 云计算竞赛平台</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet" />
    <style>
      body {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", sans-serif;
      }
      .setup-card {
        background: #fff;
        border-radius: 16px;
        padding: 40px;
        max-width: 720px;
        width: 95%;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
      }
      .step {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #f1f5f9;
      }
      .step-icon {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        margin-top: 2px;
      }
      .step-icon.pending {
        background: #e2e8f0;
        color: #94a3b8;
      }
      .step-icon.running {
        background: #dbeafe;
        color: #3b82f6;
        animation: pulse 1s infinite;
      }
      .step-icon.ok {
        background: #dcfce7;
        color: #22c55e;
      }
      .step-icon.fail {
        background: #fee2e2;
        color: #ef4444;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .build-log {
        background: #1e293b;
        color: #e2e8f0;
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 0.75rem;
        padding: 10px 14px;
        border-radius: 8px;
        max-height: 200px;
        overflow-y: auto;
        white-space: pre-wrap;
        line-height: 1.4;
        margin-top: 6px;
        display: none;
      }
      .build-log.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="setup-card text-center">
      <div style="font-size: 3rem; margin-bottom: 8px">&#x2601;</div>
      <h4 style="font-weight: 700">云计算竞赛平台</h4>
      <p class="text-muted mb-4">首次运行 · 环境初始化</p>

      <div id="steps" class="text-start mb-3"></div>

      <div id="status" class="text-muted small mb-3">正在检查环境…</div>
      <button
        id="btnGo"
        class="btn btn-primary w-100"
        style="display: none"
        onclick="location.href = '/'">
        进入系统
      </button>
      <div class="progress mt-3" style="height: 6px">
        <div
          id="bar"
          class="progress-bar progress-bar-striped progress-bar-animated"
          style="width: 0%"></div>
      </div>
    </div>

    <script>
      const steps = [
        { id: "check", label: "检查运行环境" },
        { id: "pull_base", label: "拉取基础镜像 (ubuntu:22.04)" },
        {
          id: "build_base",
          label: "正在预构建通用基础镜像(可能需要3-5分钟)",
          hasLog: true,
        },
        { id: "finish", label: "完成初始化" },
      ];

      function renderSteps() {
        let html = "";
        steps.forEach((s, i) => {
          html += '<div class="step">';
          html +=
            '<div class="step-icon pending" id="icon' +
            i +
            '"><i class="bi bi-dash"></i></div>';
          html += '<div style="flex:1"><strong>' + s.label + "</strong>";
          html +=
            '<div class="small text-muted" id="msg' + i + '">等待中…</div>';
          if (s.hasLog)
            html += '<div class="build-log" id="log' + i + '"></div>';
          html += "</div></div>";
        });
        document.getElementById("steps").innerHTML = html;
      }

      function setStep(i, state, msg) {
        const icon = document.getElementById("icon" + i);
        const msgEl = document.getElementById("msg" + i);
        icon.className = "step-icon " + state;
        if (state === "running")
          icon.innerHTML =
            '<div class="spinner-border spinner-border-sm"></div>';
        else if (state === "ok")
          icon.innerHTML = '<i class="bi bi-check-lg"></i>';
        else if (state === "fail")
          icon.innerHTML = '<i class="bi bi-x-lg"></i>';
        if (msg) msgEl.textContent = msg;
      }

      function appendLog(i, line) {
        const logEl = document.getElementById("log" + i);
        if (!logEl) return;
        logEl.classList.add("visible");
        logEl.textContent += line + "\n";
        logEl.scrollTop = logEl.scrollHeight;
      }

      async function run() {
        renderSteps();

        // Step 0: check
        setStep(0, "running", "执行中…");
        try {
          const r0 = await fetch("/setup/api/check");
          const d0 = await r0.json();
          if (d0.all_ok)
            setStep(0, "ok", "环境检查通过 — Python / Docker / SQLite 正常");
          else setStep(0, "fail", "环境检查未通过，请检查 Docker 是否启动");
        } catch (e) {
          setStep(0, "fail", "请求失败: " + e.message);
        }
        document.getElementById("bar").style.width = "15%";

        // Step 1: pull base
        setStep(1, "running", "正在从 Docker Hub 拉取…");
        document.getElementById("status").textContent = "拉取 ubuntu:22.04…";
        try {
          const r1 = await fetch("/setup/api/pull_base");
          const d1 = await r1.json();
          if (d1.ok) setStep(1, "ok", d1.msg || "拉取完成");
          else setStep(1, "fail", d1.msg || "拉取失败");
        } catch (e) {
          setStep(1, "fail", "请求失败: " + e.message);
        }
        document.getElementById("bar").style.width = "30%";
        document.getElementById("status").textContent = "预构建题库镜像…";

        // Step 2: build base image — SSE 实时输出
        setStep(2, "running", "开始构建通用基础镜像…");
        document.getElementById("bar").style.width = "45%";

        await new Promise((resolve) => {
          const es = new EventSource("/setup/api/build_base");

          es.addEventListener("message", function (e) {
            const d = JSON.parse(e.data);
            if (d.type === "start") {
              appendLog(2, "=== 开始构建通用基础镜像 comp-base:latest ===");
              setStep(2, "running", "正在构建…");
            } else if (d.type === "log") {
              appendLog(2, d.line);
            } else if (d.type === "all_done") {
              es.close();
              document.getElementById("bar").style.width = "85%";
              if (d.ok)
                setStep(
                  2,
                  "ok",
                  "通用基础镜像构建成功 — 后续所有题目直接使用此镜像",
                );
              else setStep(2, "fail", "基础镜像构建失败，请检查网络后重试");
              resolve();
            } else if (d.type === "error") {
              es.close();
              setStep(2, "fail", d.msg);
              resolve();
            }
          });

          es.addEventListener("error", function () {
            es.close();
            resolve();
          });
        });

        // Step 3: finish
        setStep(3, "running", "保存配置…");
        document.getElementById("status").textContent = "完成初始化…";
        document.getElementById("bar").style.width = "95%";
        try {
          const r3 = await fetch("/setup/api/finish");
          const d3 = await r3.json();
          if (d3.ok) setStep(3, "ok", "初始化完成");
          else setStep(3, "fail", d3.error || "保存失败");
        } catch (e) {
          setStep(3, "fail", "请求失败: " + e.message);
        }

        document.getElementById("bar").style.width = "100%";
        document
          .getElementById("bar")
          .classList.remove("progress-bar-animated");

        const allOk = [...document.querySelectorAll(".step-icon")].every((el) =>
          el.classList.contains("ok"),
        );
        if (allOk) {
          document.getElementById("status").innerHTML =
            '<span class="text-success fw-bold">&#x2705; 初始化完成！</span>';
          document.getElementById("btnGo").style.display = "";
        } else {
          document.getElementById("status").innerHTML =
            '<span class="text-danger fw-bold">&#x26A0; 部分步骤失败，请检查后刷新重试</span>';
          document.getElementById("btnGo").style.display = "";
          document.getElementById("btnGo").textContent = "重新初始化";
          document.getElementById("btnGo").onclick = function () {
            location.reload();
          };
        }
      }

      run();
    </script>
  </body>
</html>
