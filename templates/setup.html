<!--
  首次安装引导页
  自动检查运行环境，拉取基础镜像，预构建所有预设题目镜像。
  完成后才能进入系统。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统初始化 - 云计算竞赛平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family: 'Segoe UI', sans-serif; }
        .setup-card { background:#fff; border-radius:16px; padding:40px; max-width:600px; width:90%; box-shadow: 0 25px 60px rgba(0,0,0,.4); }
        .setup-card h4 { font-weight:700; color:#0f172a; }
        .step { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #f1f5f9; }
        .step-icon { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
        .step-icon.pending { background:#e2e8f0; color:#94a3b8; }
        .step-icon.running { background:#dbeafe; color:#3b82f6; animation:pulse 1s infinite; }
        .step-icon.ok { background:#dcfce7; color:#22c55e; }
        .step-icon.fail { background:#fee2e2; color:#ef4444; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    </style>
</head>
<body>
<div class="setup-card text-center">
    <div style="font-size:3rem;margin-bottom:8px;">&#x2601;&#xFE0F;</div>
    <h4>云计算竞赛平台</h4>
    <p class="text-muted mb-4">首次运行 · 环境初始化</p>

    <div id="steps" class="text-start mb-4"></div>

    <div id="status" class="text-muted small mb-3">正在检查环境…</div>
    <button id="btnGo" class="btn btn-primary w-100" style="display:none;" onclick="location.href='/'">进入系统</button>
    <div class="progress mt-3" style="height:6px;">
        <div id="bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div>
    </div>
</div>

<script>
const steps = [
    {id:'check', label:'检查运行环境'},
    {id:'pull_base', label:'拉取基础镜像 (ubuntu:22.04)'},
    {id:'build_presets', label:'预构建题库镜像'},
    {id:'finish', label:'完成初始化'},
];

function renderSteps() {
    let html = '';
    steps.forEach((s,i) => {
        html += '<div class="step"><div class="step-icon pending" id="icon'+i+'"><i class="bi bi-dash"></i></div><div><strong>'+s.label+'</strong><div class="small text-muted" id="msg'+i+'">等待中…</div></div></div>';
    });
    document.getElementById('steps').innerHTML = html;
}

function setStep(i, state, msg) {
    const icon = document.getElementById('icon'+i);
    const msgEl = document.getElementById('msg'+i);
    icon.className = 'step-icon ' + state;
    if (state === 'running') icon.innerHTML = '<div class="spinner-border spinner-border-sm"></div>';
    else if (state === 'ok') icon.innerHTML = '<i class="bi bi-check-lg"></i>';
    else if (state === 'fail') icon.innerHTML = '<i class="bi bi-x-lg"></i>';
    if (msg) msgEl.textContent = msg;
}

async function run() {
    renderSteps();
    for (let i = 0; i < steps.length; i++) {
        const s = steps[i];
        setStep(i, 'running', '执行中…');
        document.getElementById('status').textContent = s.label + '…';
        document.getElementById('bar').style.width = (i / steps.length * 100) + '%';

        try {
            const resp = await fetch('/setup/api/' + s.id);
            const data = await resp.json();
            if (s.id === 'check') {
                data.checks.forEach(c => {
                    // show each sub-check
                });
                if (data.all_ok) setStep(i, 'ok', '环境检查通过');
                else setStep(i, 'fail', '环境检查未通过');
            } else if (s.id === 'build_presets') {
                if (data.ok) {
                    setStep(i, 'ok', '全部 ' + data.results.length + ' 个镜像构建成功');
                } else {
                    const failed = data.results.filter(r => !r.ok).map(r => r.title).join(', ');
                    setStep(i, 'fail', '部分失败: ' + failed);
                }
            } else {
                if (data.ok) setStep(i, 'ok', data.msg || '完成');
                else setStep(i, 'fail', data.msg || data.error || '失败');
            }
        } catch(e) {
            setStep(i, 'fail', '网络错误: ' + e.message);
        }
    }
    document.getElementById('bar').style.width = '100%';
    document.getElementById('bar').classList.remove('progress-bar-animated');
    const allOk = [...document.querySelectorAll('.step-icon')].every(el => el.classList.contains('ok'));
    if (allOk) {
        document.getElementById('status').innerHTML = '<span class="text-success fw-bold">&#x2705; 初始化完成！</span>';
        document.getElementById('btnGo').style.display = '';
    } else {
        document.getElementById('status').innerHTML = '<span class="text-danger fw-bold">&#x26A0; 部分步骤失败，请检查日志后重试</span>';
    }
}

run();
</script>
</body>
</html>
