{% extends "base.html" %}
{% block title %}注册 - CloudComp{% endblock %}

{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center">
    <div class="auth-card" style="width:400px;max-width:90vw;">
        <div class="text-center mb-4">
            <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--c-brand),var(--c-brand-light));border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;margin-bottom:12px;">
                <i class="bi bi-person-plus-fill"></i>
            </div>
            <h5 style="font-weight:700;">选手注册</h5>
            <p class="text-muted small">创建参赛账号</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">队伍名称</label>
                <input type="text" class="form-control" name="team_name" placeholder="请输入队伍名称（可选）">
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">注 册</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a></small>
        </div>
    </div>
</div>
{% endblock %}
