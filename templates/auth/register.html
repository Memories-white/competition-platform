{% extends "base.html" %}
{% block title %}注册 - 云计算竞赛平台{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary"></i> 选手注册
                </h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="请输入用户名" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="team_name" class="form-label">队伍名称</label>
                        <input type="text" class="form-control" id="team_name" name="team_name"
                               placeholder="请输入队伍名称（可选）">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">注 册</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">
                        已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
