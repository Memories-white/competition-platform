{% extends "base.html" %}
{% block title %}登录 - 云计算竞赛平台{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-5">
                <h3 class="text-center mb-4">
                    <i class="bi bi-cloud-fill text-primary"></i> 云计算竞赛平台
                </h3>
                <h5 class="text-center text-muted mb-4">用户登录</h5>
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="请输入用户名" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登 录</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">
                        没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a>
                    </small>
                </div>
                <hr>
                <div class="text-muted small">
                    <p class="mb-1"><strong>测试账号：</strong></p>
                    <p class="mb-0">管理员: admin / admin123</p>
                    <p class="mb-0">选手: player1 / player123</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
