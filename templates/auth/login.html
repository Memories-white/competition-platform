{% extends "base.html" %}
{% block title %}登录 - CloudComp{% endblock %}

{% block content %}
<div class="auth-page d-flex align-items-center justify-content-center">
    <div class="auth-card" style="width:400px;max-width:90vw;">
        <div class="text-center mb-4">
            <div style="width:48px;height:48px;background:linear-gradient(135deg,var(--c-brand),var(--c-brand-light));border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;margin-bottom:12px;">
                <i class="bi bi-cloud-fill"></i>
            </div>
            <h5 style="font-weight:700;">CloudComp</h5>
            <p class="text-muted small">云计算竞赛平台</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <input type="text" class="form-control" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">登 录</button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></small>
        </div>

        <hr>
        <div class="text-muted small">
            <p class="mb-1 fw-semibold">测试账号</p>
            <p class="mb-0">管理员：admin / admin123</p>
            <p class="mb-0">选手：player1 / player123</p>
        </div>
    </div>
</div>
{% endblock %}
