{% extends "base.html" %}
{% block title %}系统日志{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-journal-text"></i> 系统日志</h2>
    <div class="d-flex gap-2">
        <select id="levelFilter" class="form-select" style="width:auto;">
            <option value="">全部级别</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
            <option value="DEBUG">DEBUG</option>
        </select>
        <div class="form-check form-switch d-flex align-items-center ms-2">
            <input class="form-check-input" type="checkbox" id="autoRefresh" checked>
            <label class="form-check-label" for="autoRefresh">自动刷新</label>
        </div>
        <button class="btn btn-outline-light btn-sm" onclick="fetchLogs()">
            <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div id="logContainer" class="deploy-log" style="display:block; max-height:70vh; overflow-y:auto;">
            <div class="text-center text-muted py-5">加载中...</div>
        </div>
    </div>
    <div class="card-footer d-flex justify-content-between small text-muted">
        <span id="logCount">0 条日志</span>
        <span>最近 200 条 | 每 3 秒自动刷新</span>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const logContainer = document.getElementById('logContainer');
const levelFilter = document.getElementById('levelFilter');
const autoRefreshEl = document.getElementById('autoRefresh');
const logCountEl = document.getElementById('logCount');
let refreshTimer = null;

function fetchLogs() {
    const level = levelFilter.value;
    fetch(`/admin/logs/data?limit=200&level=${encodeURIComponent(level)}`)
        .then(r => r.json())
        .then(data => {
            renderLogs(data.logs);
        })
        .catch(e => {
            logContainer.innerHTML = `<div class="text-center text-danger py-5">加载失败: ${e.message}</div>`;
        });
}

function renderLogs(logs) {
    if (!logs.length) {
        logContainer.innerHTML = '<div class="text-center text-muted py-5">暂无日志</div>';
        logCountEl.textContent = '0 条日志';
        return;
    }

    let html = '';
    logs.forEach(log => {
        const levelCls = {
            'ERROR': 'error',
            'WARNING': 'warning',
            'CRITICAL': 'error',
            'DEBUG': 'info'
        }[log.level] || 'info';

        html += `<div class="${levelCls}" style="line-height:1.6;">
            <span style="color:#888;">[${log.time}]</span>
            <span style="color:${log.level==='ERROR'?'#f44':log.level==='WARNING'?'#fa0':'#0af'};margin-left:8px;">${log.level.padEnd(7)}</span>
            <span style="color:#aaa;margin-left:8px;">${log.name}</span>
            <span style="margin-left:8px;">${escapeHtml(log.msg)}</span>
        </div>`;
    });

    logContainer.innerHTML = html;
    logContainer.scrollTop = logContainer.scrollHeight;
    logCountEl.textContent = `${logs.length} 条日志`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function toggleAutoRefresh() {
    if (autoRefreshEl.checked) {
        refreshTimer = setInterval(fetchLogs, 3000);
    } else {
        clearInterval(refreshTimer);
    }
}

levelFilter.addEventListener('change', fetchLogs);
autoRefreshEl.addEventListener('change', toggleAutoRefresh);

// Initial load
fetchLogs();
toggleAutoRefresh();
</script>
{% endblock %}
