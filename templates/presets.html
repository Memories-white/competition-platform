{% extends "base.html" %}
{% block title %}题库{% endblock %}

{% block content %}
<div class="breadcrumb-bar">
    <span>题库</span>
</div>

<div class="page-header">
    <h4><i class="bi bi-journal-bookmark-fill"></i> 预设题目</h4>
    <span class="text-muted small">共 {{ presets|length }} 道题目</span>
</div>

<div class="row g-3">
    {% for p in presets %}
    <div class="col-md-6 col-lg-4">
        <div class="card h-100">
            <div class="card-body d-flex flex-column">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h6 class="card-title mb-0">{{ p.title }}</h6>
                    <span class="badge {% if p.difficulty == '基础' %}bg-success{% else %}bg-warning text-dark{% endif %}">{{ p.difficulty }}</span>
                </div>
                <p class="text-muted small mb-3 flex-grow-1">{{ p.description }}</p>
                <div>
                    <span class="badge bg-primary bg-opacity-75 me-1 mb-1">{{ p.category }}</span>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
